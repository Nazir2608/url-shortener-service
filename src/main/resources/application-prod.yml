spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: false

logging:
  level:
    com.nazir.urlshortener: INFO
    org.hibernate.SQL: WARN

server:
  error:
    include-stacktrace: never
