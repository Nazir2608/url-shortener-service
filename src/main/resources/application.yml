spring:
  application:
    name: url-shortener-service
  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Virtual Threads (Java 21) ---
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Custom application properties
app:
  base-url: http://localhost:${server.port}
  slug:
    default-length: 7
    min-custom-length: 3
    max-custom-length: 20
  cache:
    url-ttl-hours: 24                           # Cached slug→URL TTL
    analytics-ttl-minutes: 5                    # Cached analytics response TTL
    key-prefix: "urlshortener:"                 # Redis key namespace prefix
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# --- GeoIP Configuration ---
geoip:
  enabled: true
  database-path: classpath:maxmind/GeoLite2-City.mmdb


  # --- Scheduling Thread Pool ---
  task:
    scheduling:
      pool:
        size: 2

# --- Analytics Defaults ---
analytics:
  default-range-days: 30
  max-range-days: 365
  time-series-max-points: 500
